<!DOCTYPE html>
<html>
<head>
  <title>Test Secure Storage</title>
</head>
<body>
  <h2>Secure Storage</h2>
  <div id="test-id">Check Console and Browser Storage...</div>

  <script type="module">
      import { SecureStorage } from 'https://esm.sh/secure-storage-ts';

      const config = {
          encryptionKey: 'a-super-secret-key',
          disableInDev: false
      };
      const storage = new SecureStorage(config);

      storage.store('test_data', {test: true});
      let data = storage.retrieve('test_data')

      console.log(data);

      setTimeout(() => {
          storage.clearAll().then(() => console.log('Cleared Storage!'));
      }, 5000);
  </script>
</body>
</html>
